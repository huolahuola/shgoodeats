<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark circular background -->
  <circle cx="200" cy="200" r="200" fill="#1a1a1a"/>

  <!-- === GREEN LEAVES radiating all around (rotate around center 200,200) === -->
  <!-- Each leaf is an ellipse placed at top (cx=200, cy=102), rotated around center -->

  <!-- Top cluster -->
  <ellipse cx="200" cy="102" rx="13" ry="38" fill="#16A34A" transform="rotate(0 200 200)"/>
  <ellipse cx="200" cy="102" rx="11" ry="32" fill="#22C55E" transform="rotate(18 200 200)"/>
  <ellipse cx="200" cy="102" rx="11" ry="32" fill="#22C55E" transform="rotate(-18 200 200)"/>
  <ellipse cx="200" cy="102" rx="10" ry="27" fill="#4ADE80" transform="rotate(36 200 200)"/>
  <ellipse cx="200" cy="102" rx="10" ry="27" fill="#4ADE80" transform="rotate(-36 200 200)"/>

  <!-- Upper-side leaves -->
  <ellipse cx="200" cy="102" rx="9" ry="24" fill="#22C55E" transform="rotate(54 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="24" fill="#22C55E" transform="rotate(-54 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="22" fill="#4ADE80" transform="rotate(72 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="22" fill="#4ADE80" transform="rotate(-72 200 200)"/>

  <!-- Side leaves -->
  <ellipse cx="200" cy="102" rx="8" ry="22" fill="#16A34A" transform="rotate(90 200 200)"/>
  <ellipse cx="200" cy="102" rx="8" ry="22" fill="#16A34A" transform="rotate(-90 200 200)"/>

  <!-- Lower-side leaves -->
  <ellipse cx="200" cy="102" rx="9" ry="22" fill="#4ADE80" transform="rotate(108 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="22" fill="#4ADE80" transform="rotate(-108 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="24" fill="#22C55E" transform="rotate(126 200 200)"/>
  <ellipse cx="200" cy="102" rx="9" ry="24" fill="#22C55E" transform="rotate(-126 200 200)"/>
  <ellipse cx="200" cy="102" rx="10" ry="27" fill="#4ADE80" transform="rotate(144 200 200)"/>
  <ellipse cx="200" cy="102" rx="10" ry="27" fill="#4ADE80" transform="rotate(-144 200 200)"/>

  <!-- Bottom cluster -->
  <ellipse cx="200" cy="102" rx="11" ry="30" fill="#22C55E" transform="rotate(162 200 200)"/>
  <ellipse cx="200" cy="102" rx="11" ry="30" fill="#22C55E" transform="rotate(-162 200 200)"/>
  <ellipse cx="200" cy="102" rx="12" ry="34" fill="#16A34A" transform="rotate(180 200 200)"/>

  <!-- === PINK FRUIT BODY === -->
  <circle cx="200" cy="200" r="95" fill="#F472B6"/>

  <!-- Scale texture – subtle darker arcs -->
  <circle cx="200" cy="200" r="95" fill="none" stroke="#E879A0" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="200" cy="200" rx="70" ry="72" fill="none" stroke="#E879A0" stroke-width="1.2" opacity="0.3"/>
  <ellipse cx="200" cy="200" rx="50" ry="52" fill="none" stroke="#E879A0" stroke-width="1" opacity="0.25"/>
  <!-- Curved scale lines -->
  <path d="M 140 165 Q 170 145 200 165 Q 230 145 260 165" fill="none" stroke="#DB2777" stroke-width="1.5" opacity="0.25"/>
  <path d="M 130 195 Q 165 175 200 195 Q 235 175 270 195" fill="none" stroke="#DB2777" stroke-width="1.5" opacity="0.2"/>
  <path d="M 135 225 Q 167 205 200 225 Q 233 205 265 225" fill="none" stroke="#DB2777" stroke-width="1.5" opacity="0.2"/>

  <!-- Highlight blob -->
  <ellipse cx="168" cy="172" rx="28" ry="32" fill="#FBCFE8" opacity="0.45"/>
  <ellipse cx="160" cy="164" rx="12" ry="14" fill="white" opacity="0.18"/>

  <!-- === CUTE FACE === -->
  <!-- Eyes -->
  <circle cx="180" cy="200" r="11" fill="#1a1a1a"/>
  <circle cx="220" cy="200" r="11" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="184" cy="195" r="4.5" fill="white"/>
  <circle cx="224" cy="195" r="4.5" fill="white"/>
  <!-- Tiny extra shine -->
  <circle cx="178" cy="204" r="2" fill="white" opacity="0.6"/>
  <circle cx="218" cy="204" r="2" fill="white" opacity="0.6"/>

  <!-- Blush -->
  <ellipse cx="157" cy="218" rx="16" ry="9" fill="#FB7185" opacity="0.55"/>
  <ellipse cx="243" cy="218" rx="16" ry="9" fill="#FB7185" opacity="0.55"/>

  <!-- Smile -->
  <path d="M 182 222 Q 200 238 218 222" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
