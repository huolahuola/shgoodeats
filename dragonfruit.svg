<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">

  <!-- Shadow -->
  <ellipse cx="50" cy="102" rx="22" ry="5" fill="#e8a0b0" opacity="0.3"/>

  <!-- Green crown leaves -->
  <ellipse cx="50" cy="18" rx="6" ry="18" fill="#5a9e4a" rx="6" ry="18"/>
  <ellipse cx="50" cy="18" rx="4" ry="18" fill="#6dbf57"/>
  <ellipse cx="36" cy="24" rx="5" ry="15" fill="#5a9e4a" transform="rotate(-22 36 24)"/>
  <ellipse cx="36" cy="24" rx="3" ry="15" fill="#6dbf57" transform="rotate(-22 36 24)"/>
  <ellipse cx="64" cy="24" rx="5" ry="15" fill="#5a9e4a" transform="rotate(22 64 24)"/>
  <ellipse cx="64" cy="24" rx="3" ry="15" fill="#6dbf57" transform="rotate(22 64 24)"/>
  <ellipse cx="25" cy="34" rx="4" ry="12" fill="#5a9e4a" transform="rotate(-38 25 34)"/>
  <ellipse cx="75" cy="34" rx="4" ry="12" fill="#5a9e4a" transform="rotate(38 75 34)"/>

  <!-- Body dark outline -->
  <circle cx="50" cy="68" r="32" fill="#c94070"/>

  <!-- Body main -->
  <circle cx="50" cy="67" r="30" fill="#f472b6"/>

  <!-- Body highlight -->
  <ellipse cx="42" cy="55" rx="10" ry="12" fill="#fba8cf" opacity="0.6"/>

  <!-- Left arm/scale -->
  <ellipse cx="20" cy="72" rx="7" ry="10" fill="#5a9e4a" transform="rotate(-30 20 72)"/>
  <ellipse cx="20" cy="72" rx="5" ry="8" fill="#6dbf57" transform="rotate(-30 20 72)"/>

  <!-- Right arm/scale -->
  <ellipse cx="80" cy="72" rx="7" ry="10" fill="#5a9e4a" transform="rotate(30 80 72)"/>
  <ellipse cx="80" cy="72" rx="5" ry="8" fill="#6dbf57" transform="rotate(30 80 72)"/>

  <!-- Bottom scales -->
  <ellipse cx="35" cy="93" rx="5" ry="8" fill="#5a9e4a" transform="rotate(-15 35 93)"/>
  <ellipse cx="50" cy="96" rx="5" ry="7" fill="#5a9e4a"/>
  <ellipse cx="65" cy="93" rx="5" ry="8" fill="#5a9e4a" transform="rotate(15 65 93)"/>

  <!-- Body over bottom scales -->
  <ellipse cx="50" cy="80" rx="29" ry="18" fill="#f472b6"/>

  <!-- Blush -->
  <ellipse cx="36" cy="72" rx="7" ry="5" fill="#fb7185" opacity="0.55"/>
  <ellipse cx="64" cy="72" rx="7" ry="5" fill="#fb7185" opacity="0.55"/>

  <!-- Eyes -->
  <ellipse cx="43" cy="64" rx="3" ry="3.5" fill="#2d1a1a"/>
  <ellipse cx="57" cy="64" rx="3" ry="3.5" fill="#2d1a1a"/>
  <!-- Eye shine -->
  <circle cx="44.5" cy="62.5" r="1.3" fill="white"/>
  <circle cx="58.5" cy="62.5" r="1.3" fill="white"/>

  <!-- Mouth -->
  <rect x="47" y="72" width="6" height="4" rx="2" fill="#2d1a1a"/>

</svg>
